# deployment.yaml
#
# Images pulled from DockerHub — DOCKERHUB_USER and IMAGE_TAG are replaced
# by the Jenkins pipeline before applying:
#   sed -i 's|DOCKERHUB_USER|yourusername|g' deployment.yaml
#   sed -i 's|IMAGE_TAG|abc1234|g'            deployment.yaml
#
# DockerHub pull credentials are pre-configured in containerd on each worker
# by Terraform's worker_init.sh — no imagePullSecrets needed here.

---
# ── MongoDB StatefulSet ───────────────────────────────────────────────────────
# StatefulSet gives MongoDB a stable identity (mongodb-0) and
# lets it reattach to the same PVC after restarts.
# Image is from DockerHub official — always public, no auth needed.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: default
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        tier: database
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0              # official DockerHub image — public
        ports:
        - containerPort: 27017
        envFrom:
        - secretRef:
            name: mongodb-secrets
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db         # MongoDB data directory — backed by PVC
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command: ["mongosh", "--eval", "db.adminCommand('ping')"]
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          exec:
            command: ["mongosh", "--eval", "db.adminCommand('ping')"]
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc      # defined in storage.yaml

---
# ── Backend Deployment ────────────────────────────────────────────────────────
# Image: DOCKERHUB_USER/foodapp-backend:IMAGE_TAG
# Jenkins pushes this image to DockerHub.
# Containerd on workers pulls it using the credentials set up by Terraform.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
      - name: backend
        image: DOCKERHUB_USER/foodapp-backend:IMAGE_TAG
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10

---
# ── Frontend Deployment ───────────────────────────────────────────────────────
# Image: DOCKERHUB_USER/foodapp-frontend:IMAGE_TAG
# React app served by nginx — pulls from DockerHub same as backend.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: frontend
        image: DOCKERHUB_USER/foodapp-frontend:IMAGE_TAG
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
